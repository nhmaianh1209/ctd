<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Lịch đào tạo · Coteccons Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A2540;
    --navy-2:#143A5C;
    --teal:#14B8A6;
    --teal-dark:#0F8C7E;
    --teal-light:#CCFBF1;
    --gray-50:#F8FAFC;
    --gray-100:#F1F5F9;
    --gray-200:#E2E8F0;
    --gray-300:#CBD5E1;
    --gray-500:#64748B;
    --gray-700:#334155;
    --shadow-sm:0 1px 2px rgba(10,37,64,.06);
    --shadow:0 4px 16px rgba(10,37,64,.08);
    --shadow-lg:0 12px 32px rgba(10,37,64,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{font-family:'Lexend Deca',system-ui,sans-serif;color:var(--navy);background:var(--gray-50);min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:none;}
  a{color:var(--teal-dark);}

  /* Hero */
  header.hero{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff;padding:36px 24px 28px;text-align:center;
  }
  header.hero .badge{
    display:inline-block;background:rgba(20,184,166,.18);color:var(--teal-light);
    padding:5px 14px;border-radius:20px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;margin-bottom:12px;
  }
  header.hero h1{font-size:28px;font-weight:600;margin-bottom:6px;}
  header.hero p{color:var(--gray-300);font-size:14px;font-weight:300;}

  /* Main */
  main{max-width:1200px;margin:-20px auto 40px;padding:0 24px;}
  .panel{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:20px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:18px;}
  .month-nav{display:flex;align-items:center;gap:12px;}
  .month-nav h2{font-size:20px;font-weight:600;min-width:170px;text-align:center;}
  .nav-btn{background:var(--gray-100);width:36px;height:36px;border-radius:8px;font-size:16px;color:var(--navy);transition:.2s;}
  .nav-btn:hover{background:var(--gray-200);}
  .legend{font-size:12px;color:var(--gray-500);display:flex;align-items:center;gap:8px;}
  .legend .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);display:inline-block;}

  /* Calendar */
  .calendar{border-radius:12px;overflow:hidden;border:1px solid var(--gray-200);}
  .cal-head,.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
  .cal-head>div{padding:11px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
  .cal-head>div.weekend{color:var(--teal);}
  .day{
    min-height:108px;padding:8px;border-right:1px solid var(--gray-100);border-bottom:1px solid var(--gray-100);
    cursor:pointer;transition:.15s;position:relative;display:flex;flex-direction:column;gap:4px;
  }
  .day:hover{background:var(--gray-50);}
  .day:nth-child(7n){border-right:none;}
  .day.other-month{background:#FAFBFC;cursor:default;}
  .day.other-month:hover{background:#FAFBFC;}
  .day.empty-day{cursor:default;}
  .day.today .daynum{background:var(--teal);color:#fff;}
  .daynum{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:500;}
  .day.weekend .daynum{color:var(--teal);}
  .day.other-month .daynum{color:var(--gray-300);}
  .pill{
    font-size:11px;padding:3px 8px;border-radius:6px;line-height:1.3;
    background:var(--teal-light);color:var(--teal-dark);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;gap:4px;
  }
  .pill::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0;}
  .more-tag{font-size:10px;color:var(--gray-500);padding:0 4px;}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,37,64,.55);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;}
  .modal-backdrop.show{display:flex;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:620px;box-shadow:var(--shadow-lg);margin:auto;animation:slideIn .25s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .modal-head h3{font-size:17px;font-weight:600;flex:1;}
  .modal-close{background:transparent;font-size:24px;color:var(--gray-500);width:32px;height:32px;border-radius:8px;transition:.2s;flex-shrink:0;}
  .modal-close:hover{background:var(--gray-100);}
  .modal-body{padding:24px;max-height:calc(100vh - 200px);overflow-y:auto;}

  .course-card{padding:14px;border:1px solid var(--gray-200);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:.15s;}
  .course-card:hover{border-color:var(--teal);background:var(--gray-50);}
  .course-card .name{font-weight:600;font-size:14px;margin-bottom:6px;}
  .course-card .meta{font-size:12px;color:var(--gray-500);}

  .detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:13px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .lbl{min-width:130px;color:var(--gray-500);font-weight:500;flex-shrink:0;}
  .detail-row .val{flex:1;color:var(--gray-700);}
  .detail-row .val a{word-break:break-all;}
  .format-chip{display:inline-block;background:var(--teal-light);color:var(--teal-dark);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;margin:2px 4px 2px 0;}

  /* Footer */
  footer{text-align:center;padding:20px;color:var(--gray-500);font-size:12px;}

  .empty{text-align:center;padding:36px 20px;color:var(--gray-500);font-size:13px;}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--gray-200);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:768px){
    header.hero{padding:28px 16px 24px;}
    header.hero h1{font-size:22px;}
    main{padding:0 14px;margin-top:-16px;}
    .panel{padding:14px;}
    .day{min-height:74px;padding:5px;}
    .daynum{width:22px;height:22px;font-size:12px;}
    .pill{font-size:10px;padding:2px 6px;}
    .month-nav h2{font-size:17px;min-width:130px;}
    .cal-head>div{font-size:10px;padding:8px 4px;}
    .detail-row{flex-direction:column;gap:2px;}
    .detail-row .lbl{min-width:auto;}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="badge">Coteccons Academy · L&amp;OD</div>
  <h1>Lịch đào tạo</h1>
  <p>Kế hoạch các khoá học sắp diễn ra · Bấm vào ngày để xem chi tiết</p>
</header>

<main>
  <div class="panel">
    <div class="toolbar">
      <div class="month-nav">
        <button class="nav-btn" id="prevMonth">‹</button>
        <h2 id="monthLabel">—</h2>
        <button class="nav-btn" id="nextMonth">›</button>
      </div>
      <div class="legend"><span class="dot"></span> Khoá đào tạo</div>
    </div>
    <div class="calendar">
      <div class="cal-head">
        <div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div>
        <div class="weekend">T7</div><div class="weekend">CN</div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>
</main>

<footer>Cập nhật bởi Phòng L&amp;OD · Coteccons Academy</footer>

<!-- Day modal -->
<div class="modal-backdrop" id="dayModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="dayModalTitle">—</h3>
      <button class="modal-close" data-close>×</button>
    </div>
    <div class="modal-body" id="dayModalBody"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="detailTitle">—</h3>
      <button class="modal-close" data-close>×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCl0izQatfWqRqQ4PjeJv242Q2obuaSyXw",
  authDomain: "ctd-training-calendar.firebaseapp.com",
  projectId: "ctd-training-calendar",
  storageBucket: "ctd-training-calendar.firebasestorage.app",
  messagingSenderId: "12986365110",
  appId: "1:12986365110:web:61083721f3c60525b7a217"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let monthCourses = [];
const MONTHS_VI = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

document.getElementById('prevMonth').addEventListener('click', ()=>{
  currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;}
  renderMonth();
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
  currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;}
  renderMonth();
});

async function loadMonth(){
  const q = query(collection(db,'courses'),
    where('year','==',currentYear),
    where('month','==',currentMonth+1),
    where('visibility','==','public'));
  const snap = await getDocs(q);
  monthCourses = snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function renderMonth(){
  document.getElementById('monthLabel').textContent = `${MONTHS_VI[currentMonth]} ${currentYear}`;
  document.getElementById('calBody').innerHTML = '<div class="empty" style="grid-column:1/-1;"><span class="spinner"></span></div>';
  try{
    await loadMonth();
    drawCalendar();
  }catch(e){
    console.error(e);
    document.getElementById('calBody').innerHTML = '<div class="empty" style="grid-column:1/-1;">Lỗi tải dữ liệu. Vui lòng thử lại.</div>';
  }
}

function drawCalendar(){
  const firstDay = new Date(currentYear,currentMonth,1);
  let offset = (firstDay.getDay()+6)%7; // Monday-first
  const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate();
  const prevDaysInMonth = new Date(currentYear,currentMonth,0).getDate();

  const byDay = {};
  monthCourses.forEach(c=>{
    (c.days||[]).forEach(d=>{ (byDay[d] = byDay[d]||[]).push(c); });
  });

  let html = '';
  const totalCells = Math.ceil((offset+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const dayCol = i%7;
    const isWeekend = dayCol>=5;
    let cls = 'day';
    if(isWeekend) cls += ' weekend';
    let dayNum, isOther=false;
    if(i<offset){ dayNum = prevDaysInMonth - offset + 1 + i; cls+=' other-month'; isOther=true; }
    else if(i>=offset+daysInMonth){ dayNum = i - offset - daysInMonth + 1; cls+=' other-month'; isOther=true; }
    else{
      dayNum = i - offset + 1;
      const isToday = (dayNum===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear());
      if(isToday) cls+=' today';
    }
    let inner = `<span class="daynum">${dayNum}</span>`;
    let list = [];
    if(!isOther){
      list = byDay[dayNum]||[];
      const show = list.slice(0,3);
      show.forEach(c=>{
        const label = c.short_name || c.name;
        inner += `<div class="pill" title="${esc(c.name)}">${esc(label)}</div>`;
      });
      if(list.length>3) inner += `<div class="more-tag">+${list.length-3} khác</div>`;
      if(list.length===0) cls += ' empty-day';
    }
    const dataAttr = (!isOther && list.length>0) ? `data-day="${dayNum}"` : '';
    html += `<div class="${cls}" ${dataAttr}>${inner}</div>`;
  }
  document.getElementById('calBody').innerHTML = html;
  document.querySelectorAll('.day[data-day]').forEach(el=>{
    el.addEventListener('click', ()=>openDayModal(parseInt(el.dataset.day)));
  });
}

function esc(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openDayModal(day){
  const list = monthCourses.filter(c=>(c.days||[]).includes(day));
  document.getElementById('dayModalTitle').textContent =
    `Ngày ${day} · ${MONTHS_VI[currentMonth]} ${currentYear} — ${list.length} khoá học`;
  const body = document.getElementById('dayModalBody');
  if(list.length===0){
    body.innerHTML = '<div class="empty">Không có khoá học nào trong ngày này.</div>';
  }else{
    body.innerHTML = list.map(c=>`
      <div class="course-card" data-id="${c.id}">
        <div class="name">${esc(c.name)}</div>
        <div class="meta">${(c.formats||[]).map(esc).join(' · ')} &nbsp;·&nbsp; ${c.duration_hours||0} giờ</div>
      </div>
    `).join('');
    body.querySelectorAll('.course-card').forEach(el=>{
      el.addEventListener('click', ()=>{
        const c = list.find(x=>x.id===el.dataset.id);
        openDetail(c);
      });
    });
  }
  document.getElementById('dayModal').classList.add('show');
}

function openDetail(c){
  const regText = {
    link: c.registration_link
      ? `<a href="${esc(c.registration_link)}" target="_blank">${esc(c.registration_link)}</a>`
      : 'Đăng ký tại link (đang cập nhật)',
    email: 'Email đăng ký được gửi cho đối tượng tham gia',
    assigned: 'Theo danh sách được chỉ định',
    other: esc(c.registration_other||'')
  }[c.registration_type] || '—';

  const formats = (c.formats||[]).map(f=>`<span class="format-chip">${esc(f)}</span>`).join('');
  const days = (c.days||[]).join(', ');

  let html = `
    <div class="detail-row"><div class="lbl">Hình thức</div><div class="val">${formats}</div></div>
    <div class="detail-row"><div class="lbl">Đối tượng</div><div class="val">${esc(c.target||'')}</div></div>
    <div class="detail-row"><div class="lbl">Thời lượng</div><div class="val">${c.duration_hours||0} giờ</div></div>
    <div class="detail-row"><div class="lbl">Ngày diễn ra</div><div class="val">${days} · ${MONTHS_VI[currentMonth]} ${currentYear}</div></div>
    <div class="detail-row"><div class="lbl">Cách đăng ký</div><div class="val">${regText}</div></div>
  `;
  if(c.requirements){
    html += `<div class="detail-row"><div class="lbl">Điều kiện</div><div class="val">${esc(c.requirements)}</div></div>`;
  }
  document.getElementById('detailTitle').textContent = c.name;
  document.getElementById('detailBody').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

document.querySelectorAll('[data-close]').forEach(b=>{
  b.addEventListener('click', closeAllModals);
});
document.querySelectorAll('.modal-backdrop').forEach(bd=>{
  bd.addEventListener('click', e=>{ if(e.target===bd) closeAllModals(); });
});
function closeAllModals(){
  document.querySelectorAll('.modal-backdrop').forEach(m=>m.classList.remove('show'));
}

renderMonth();
</script>
</body>
</html>
