server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inject runtime config (SSO client IDs etc.) — swap values via env
    location = /config.js {
        add_header Content-Type application/javascript;
        return 200 "window.__CTD_CLIENT_ID__='${MSAL_CLIENT_ID}';window.__CTD_TENANT_ID__='${MSAL_TENANT_ID}';";
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback per tool folder
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
