<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTD Tools</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f8fa;
      margin: 0;
      padding: 40px 20px;
      color: #0f172a;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #003b5c;
      font-size: 28px;
    }

    p {
      color: #475569;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }

    a.card {
      display: block;
      text-decoration: none;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #dbeafe;
      background: #f8fafc;
      color: #003b5c;
      transition: 0.2s;
    }

    a.card:hover {
      background: #e0f2fe;
      transform: translateY(-2px);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CTD Tools</h1>
    <p>Vui lòng chọn công cụ cần truy cập.</p>

    <div class="grid">
      <a class="card" href="./9Box/">
        <div class="title">9Box</div>
        <div class="desc">Truy cập công cụ 9Box.</div>
      </a>

      <a class="card" href="./tech-assess-en/">
        <div class="title">Tech Assess - English</div>
        <div class="desc">Access the English version of Tech Assessment.</div>
      </a>

      <a class="card" href="./tech-assess-vn/">
        <div class="title">Tech Assess - Vietnamese</div>
        <div class="desc">Truy cập phiên bản tiếng Việt của Tech Assessment.</div>
      </a>
    </div>
  </div>
</body>
</html>
